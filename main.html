<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form action="" method="get">
		<h2>Dog Adoption Application</h2>
		<!-- Name -->
		<label for="name">Name</label>
		<input type="text" id="name" placeholder="Name" />
		
		<!-- Phone -->
		<label for="phone">Phone Number</label>
		<input type="text" id="phone" placeholder="Phone Number" />

		<!-- Address -->
		<label for="address">Address</label>
		<input type="text" id="address" placeholder="Address" />

		<!-- Checkbox -->
        <div class="checkbox-container">
			<label for="checkbox">
                Have you ever lived with a Dog before?
            </label>
            <input 
                type="checkbox" id="checkbox" value="Have you ever lived with a Dog before?"
            />
        </div>
		
		
		<!-- Select -->
		<label for="multiSelect">Please select your preferred breeds</label>
		<select id="multiSelect" multiple>
			<option>Bulldog</option>
			<option>poodle</option>
			<option>Beagle</option>
			<option>Sheltie</option>
		</select>

		<!-- Submit -->
		<label for="submit">Submit</label>
		<input type="submit" id="submit" value="Submit"/>
		
	</form>
    <script type="text/javascript" src="./script.js">
	</script>

</body>

</html>
